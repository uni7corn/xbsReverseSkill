interface:
  display_name: "网页 JS 补环境"
  short_description: "网页端 JS Node.js 补环境、取证工具选择、isTrusted 可信输入、补环境框架选择、addon-first、ABI 恢复、阶段报告、API 调用回放分类、高强度行为 diff、native 能力缺口闭环、指纹值回放与 TLS 请求"
  default_prompt: "使用 $web-js-env-patcher 检查我的网页端 JS Node.js 补环境任务信息，新 case 第一回复先输出信息完整性检查、已识别信息、缺失项、可疑参数候选和暂停说明；缺少取证模式、最终请求 TLS 指纹兼容客户端或本次分析参数确认时，不要启动取证、运行旧代码、下载 JS、写补环境或发送真实请求；从一开始先让我选择 ruyiPage + RuyiTrace、仅 ruyiPage、Camoufox + camoufox-reverse-mcp、仅 Camoufox、CloakBrowser、用户手动取证或 AI 自行决定，并同时确认最终请求 TLS 指纹兼容客户端：Node.js CycleTLS、Node.js impers、Python curl_cffi、Python cffi_curl、Python cyCronet 或不发真实请求；进入正式补环境前让我选择不使用补环境框架（默认）、isolated-vm（随包魔改 xbs isolated-vm）、Node.js 内置 vm 或 jsEnv，未明确选择时按不使用继续，Trace 复杂度评估只用于风险和优先级，不自动决定补环境框架；如果选择 isolated-vm，先检测随包魔改 isolated_vm.node、当前 Node ABI、平台和 Context 内 window.xbs 17 个 API；ABI 不匹配时先询问我是否通过 nvm 安装/切换 Node.js v26.3.1 并重新自检，我拒绝或切换后仍失败时才要求我提供匹配构建产物或改选，不要自动退回 npm 原版 isolated-vm，也不要桥接旧 addon.node；如果选择 jsEnv，先要求我提供 jsEnv 项目路径、入口文件和使用文档，未检测通过前不要虚构 jsEnv API；如果选择 ruyiPage + RuyiTrace，检测到 RuyiTrace 已安装时优先自动捕获并导入 NDJSON，不默认等待我手动 trace；ruyiPage 自动交互优先 native BiDi/page.actions/human actions，必要 JS 事件必须带 ruyi:true，防止 isTrusted 检测；如果 RuyiTrace 未安装，先引导我安装或明确确认是否降级；如果选择 Camoufox 或 Camoufox + camoufox-reverse-mcp，先检测 Camoufox Python 包、浏览器本体 fetch 状态和 MCP 可导入状态，未安装时要求我提供 Python/venv、缓存目录或 MCP 项目目录并引导安装，从第一次打开目标页开始使用 headless:false、humanize:true、代理场景 geoip:true/block_webrtc:true 的官方入口，自动点击/拖拽/键盘/滚动不得用普通 dispatchEvent 作为主路径；如果选择 CloakBrowser，先检测官方 Python/Node.js 包和 stealth Chromium 二进制，未安装时要求我提供路径或确认安装，并从第一次打开目标页开始使用 headless:false、humanize:true 的官方启动方式，交互使用 humanize/官方输入方法，退回 page.evaluate 合成事件时先暂停确认；如果遇到 Canvas/WebGL/WebGPU/Audio/字体/DOM 几何等指纹，先采集真实浏览器终端 API 返回值并在 Node.js 中回放，不要因为 node-canvas/headless-gl/jsdom 不一致就把最终流程改成自动化浏览器；如果遇到非登录 Cookie 过期，先分析 Cookie 生成 / 刷新链路，不默认索要新 Cookie；信息完整后、取证前先确认是否为验证码/风控验证/challenge/WAF 接口，如果是则让我选择提供从触发到验证的完整流程由你自动取证，或我自己完成流程你只负责提前开启抓包/Hook/Trace 并等待我回复已经完成触发到验证流程；验证码 RuyiTrace 必须覆盖触发、展示、交互、验证提交和 verify 接口返回；验证码补环境可先使用旧 motionTrack/eventFixture 轨迹只为生成加密参数，但必须暴露可替换入口并写 UTF-8 中文注释，后续识别、真实轨迹和验证分析前先检测 web-verify-patcher 是否安装，未安装则引导从 lwjjike/xbsReverseSkill 或用户提供来源安装；如果下载或保存动态 HTML/JS/challenge/403 风控页面，先写入 case/notes/resource-manifest.json，把旧文件只作为分析快照；影响最终参数生成时 final 入口必须运行时刷新当前 HTML/JS/seed/challenge，并在交付前运行 check_dynamic_resources.js；并从第一轮需求信息开始生成 case/阶段报告/01-需求信息确认.md 等中文命名 UTF-8 阶段报告，再规划 source/entry/builder/writer 前置分析、Node 泄露检查、RuyiTrace NDJSON 优先诊断、缺失环境追踪、addon-first 新版 API 或 xbs native-first 创建函数/访问器/document.all/原型链/集合对象/plugins/mimeTypes、addon ABI 不兼容时先询问 nvm + Node.js v25.8.2，用户拒绝后才 NativeProtect 降级记录、通用代码变更记忆、防止错误逻辑回退、属性描述符/toString 保护与 fixtures 验证；如果纯 JS、当前 addon.node API、当前 xbs isolated-vm / xbs.dom API 都无法覆盖目标浏览器语义，暂停硬补，输出 native 能力缺口报告、建议新增 API、最小行为测试用例和通过标准，等用户扩展 native 能力并通过测试后再继续，或明确记录临时 workaround / 阻塞。"
