interface:
  display_name: "网页 JS 补环境"
  short_description: "网页端 JS Node.js 补环境、RuyiTrace/Camoufox 取证、addon-first、通用代码变更记忆、阶段报告、指纹值回放与 TLS 请求"
  default_prompt: "使用 $web-js-env-patcher 检查我的网页端 JS Node.js 补环境任务信息，从一开始先让我选择 ruyiPage + RuyiTrace、仅 ruyiPage、Camoufox + camoufox-reverse-mcp、仅 Camoufox、CloakBrowser、用户手动取证或 AI 自行决定，并同时确认最终请求 TLS 指纹兼容客户端：Node.js CycleTLS、Node.js impers、Python curl_cffi、Python cffi_curl、Python cyCronet 或不发真实请求；如果选择 ruyiPage + RuyiTrace 但 RuyiTrace 未安装，先引导我安装或明确确认是否降级；如果选择 Camoufox 或 Camoufox + camoufox-reverse-mcp，先检测 Camoufox Python 包、浏览器本体 fetch 状态和 MCP 可导入状态，未安装时要求我提供 Python/venv、缓存目录或 MCP 项目目录并引导安装，从第一次打开目标页开始使用 headless:false、humanize:true、代理场景 geoip:true/block_webrtc:true 的官方入口；如果选择 CloakBrowser，先检测官方 Python/Node.js 包和 stealth Chromium 二进制，未安装时要求我提供路径或确认安装，并从第一次打开目标页开始使用 headless:false、humanize:true 的官方启动方式；如果遇到 Canvas/WebGL/WebGPU/Audio/字体/DOM 几何等指纹，先采集真实浏览器终端 API 返回值并在 Node.js 中回放，不要因为 node-canvas/headless-gl/jsdom 不一致就把最终流程改成自动化浏览器；如果遇到非登录 Cookie 过期，先分析 Cookie 生成 / 刷新链路，不默认索要新 Cookie；并从第一轮需求信息开始生成 case/阶段报告/01-需求信息确认.md 等中文命名 UTF-8 阶段报告，再规划 source/entry/builder/writer 前置分析、Node 泄露检查、RuyiTrace NDJSON 优先诊断、缺失环境追踪、addon-first 新版 API 创建函数/访问器/document.all/原型链、NativeProtect 降级记录、通用代码变更记忆、防止错误逻辑回退、属性描述符/toString 保护与 fixtures 验证。"
